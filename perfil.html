<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil Médico</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  display: flex;
  justify-content: center;
}

.card {
  background: white;
  margin-top: 40px;
  padding: 20px;
  width: 320px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  color: #007BFF;
}

.section {
  margin-top: 10px;
}

.label {
  font-weight: bold;
}

.emergency {
  background: #ffdddd;
  padding: 10px;
  border-radius: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">
<h2>Ficha Médica</h2>
<div id="info"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const data = JSON.parse(localStorage.getItem(id));

if(data){
  document.getElementById("info").innerHTML = `
    <div class="section"><span class="label">Nombre:</span> ${data.nombre}</div>
    <div class="section"><span class="label">Edad:</span> ${data.edad}</div>
    <div class="section"><span class="label">Tipo de sangre:</span> ${data.sangre}</div>

    <div class="section"><span class="label">Enfermedades:</span> ${data.enfermedades}</div>
    <div class="section"><span class="label">Medicamentos:</span> ${data.medicamentos}</div>
    <div class="section"><span class="label">Alergias:</span> ${data.alergias}</div>

    <div class="emergency">
      <span class="label">Contacto de emergencia:</span><br>
      ${data.contacto}
    </div>

    <div class="section"><span class="label">Notas:</span> ${data.notas}</div>
  `;
} else {
  document.getElementById("info").innerHTML = "No se encontraron datos";
}
</script>

</body>
</html>
